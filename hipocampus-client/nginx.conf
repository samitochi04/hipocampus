# hipocampus-client/nginx.conf
#
# Two responsibilities:
#   1. Serve the React SPA with try_files fallback so client-side routes like
#      /chat and /memory resolve to index.html instead of 404.
#   2. Reverse-proxy /api/* to the backend `api` service on port 8000.
#      This is the production equivalent of Vite's dev-server proxy in
#      vite.config.js. The client uses relative paths (/api/v1/...) so no
#      URL change is needed between dev and production.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ─────────────────────────────────────────────────
    # Compresses JS/CSS/JSON responses. Vite already minifies the bundle,
    # but gzip cuts transfer size by another ~70% for text assets.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Static assets with long-term caching ─────────────────────────────
    # Vite appends a content hash to every JS/CSS file name, so it is safe
    # to cache them for a year. index.html is excluded (no hash, must always
    # be fresh so the user picks up new bundle URLs).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API reverse proxy ─────────────────────────────────────────────────
    # Forwards every /api/* request to the FastAPI backend running in the
    # `api` Docker service. "api" resolves via Docker's internal DNS.
    #
    # proxy_cookie_flags: sets SameSite=Lax on cookies forwarded back to the
    # browser so httpOnly session cookies work correctly in modern browsers.
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;

        # Forward the real client IP and protocol so the backend can log
        # accurately and generate correct redirects.
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep the connection alive for streaming / chunked responses.
        proxy_set_header   Connection        "";

        # Generous timeouts for long-running Qwen API calls.
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────
    # For any path that doesn't match a static file or /api/*, serve
    # index.html so React Router handles the route client-side.
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must never be cached — it contains the hashed asset URLs
        # that change on every deploy.
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header Referrer-Policy         "strict-origin"   always;
}