services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: hipocampus
      POSTGRES_USER: hipocampus
      POSTGRES_PASSWORD: hipocampus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hipocampus -d hipocampus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./hipocampus-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: ./hipocampus-backend/.env
    environment:
      AUTO_CREATE_TABLES: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: ./hipocampus-backend
    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=info
      -Q consolidation,default
      --concurrency=1
    env_file: ./hipocampus-backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: ./hipocampus-backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: ./hipocampus-backend/.env
    depends_on:
      - worker

volumes:
  pgdata: