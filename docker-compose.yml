services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: hipocampus
      POSTGRES_USER: hipocampus
      POSTGRES_PASSWORD: hipocampus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on: [postgres, redis]

  worker:
    build: .
    command: celery -A workers.consolidation worker --loglevel=info
    env_file: .env
    depends_on: [postgres, redis]

  beat:
    build: .
    command: celery -A workers.consolidation beat --loglevel=info
    env_file: .env
    depends_on: [postgres, redis]

volumes:
  pgdata: