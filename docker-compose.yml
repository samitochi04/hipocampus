services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: hipocampus
      POSTGRES_USER: hipocampus
      POSTGRES_PASSWORD: hipocampus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hipocampus -d hipocampus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend ─────────────────────────────────────────────────────────────────

  api:
    build: ./hipocampus-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: ./hipocampus-backend/.env
    environment:
      AUTO_CREATE_TABLES: "true"
      # COOKIE_SECURE must be false for local HTTP development.
      # Browsers silently drop cookies with the Secure attribute when the
      # page is served over plain http:// — login succeeds (200) but every
      # subsequent request returns 401 because the cookie is never sent back.
      COOKIE_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # curl is not installed in python:3.12-slim, so use Python's built-in
      # urllib instead. This is guaranteed to work in any Python image.
      test: >
        CMD python -c
        "import urllib.request, sys;
        r = urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=4);
        sys.exit(0 if r.status == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build: ./hipocampus-backend
    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=info
      -Q consolidation,default
      --concurrency=1
    env_file: ./hipocampus-backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: ./hipocampus-backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: ./hipocampus-backend/.env
    depends_on:
      - worker

  # ── Frontend ────────────────────────────────────────────────────────────────

  client:
    build: ./hipocampus-client
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata: